name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: Deploy target after packaging
        type: choice
        options:
          - none
          - s3
          - ssh
        default: none
      environment:
        description: Promotion environment
        type: choice
        options:
          - staging
          - production
        default: staging
      dry_run:
        description: Print deploy commands only (s3/ssh)
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: deploy-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.13"
  PYTHONUTF8: "1"

jobs:
  promote-staging:
    name: Promote staging artifact
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Validate pack (strict)
        run: |
          python skills/.system/scripts/check_pack_health.py --skills-root skills --strict --format json
          python skills/.system/scripts/validate_tool_contracts.py --skills-root skills --strict --format json

      - name: Build staging ZIP
        run: python skills/.system/scripts/build_release_zip.py --project-root . --apply --exclude-tests --format json

      - name: Upload staging artifact
        uses: actions/upload-artifact@v4
        with:
          name: codexai-skill-pack-staging
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 14

      - name: Post-extract smoke
        run: |
          ZIP=$(ls dist/*.zip | head -1)
          python skills/.system/scripts/promote_deploy.py --zip "$ZIP" --target none --environment staging --format json

  promote-production:
    name: Promote production release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Validate package metadata
        run: |
          python skills/.system/scripts/validate_codex_plugin.py --plugin-root . --strict --format json
          python skills/.system/scripts/validate_claude_plugin.py --plugin-root . --format json
          python skills/.system/scripts/check_pack_health.py --skills-root skills --strict --format json
          python skills/.system/scripts/validate_tool_contracts.py --skills-root skills --strict --format json

      - name: Build release ZIP
        run: python skills/.system/scripts/build_release_zip.py --project-root . --apply --exclude-tests --format json

      - name: Post-extract smoke
        run: |
          ZIP=$(ls dist/*.zip | head -1)
          python skills/.system/scripts/promote_deploy.py --zip "$ZIP" --target none --environment production --format json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Optional real-environment deploy
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          S3_BUCKET_PRODUCTION: ${{ secrets.S3_BUCKET_PRODUCTION }}
          S3_PREFIX: ${{ vars.S3_PREFIX }}
          SSH_HOST_PRODUCTION: ${{ secrets.SSH_HOST_PRODUCTION }}
          SSH_USER: ${{ vars.SSH_USER }}
          SSH_DEPLOY_PATH: ${{ vars.SSH_DEPLOY_PATH }}
        run: |
          ZIP=$(ls dist/*.zip | head -1)
          if [[ -n "$S3_BUCKET_PRODUCTION" ]]; then
            python skills/.system/scripts/promote_deploy.py --zip "$ZIP" --target s3 --environment production --format json
          elif [[ -n "$SSH_HOST_PRODUCTION" ]]; then
            python skills/.system/scripts/promote_deploy.py --zip "$ZIP" --target ssh --environment production --format json
          else
            echo "No S3_BUCKET_PRODUCTION or SSH_HOST_PRODUCTION secret; GitHub Release only."
          fi

  promote-dispatch:
    name: Manual promote
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Local release gate
        run: python skills/.system/scripts/local_release_gate.py --apply --format json

      - name: Promote to target
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          S3_BUCKET_STAGING: ${{ secrets.S3_BUCKET_STAGING }}
          S3_BUCKET_PRODUCTION: ${{ secrets.S3_BUCKET_PRODUCTION }}
          S3_PREFIX: ${{ vars.S3_PREFIX }}
          SSH_HOST_STAGING: ${{ secrets.SSH_HOST_STAGING }}
          SSH_HOST_PRODUCTION: ${{ secrets.SSH_HOST_PRODUCTION }}
          SSH_USER: ${{ vars.SSH_USER }}
          SSH_DEPLOY_PATH: ${{ vars.SSH_DEPLOY_PATH }}
        run: |
          ZIP=$(ls dist/*.zip | head -1)
          EXTRA=""
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then EXTRA="--dry-run"; fi
          python skills/.system/scripts/promote_deploy.py \
            --zip "$ZIP" \
            --target "${{ inputs.target }}" \
            --environment "${{ inputs.environment }}" \
            $EXTRA \
            --format json
