name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  PYTHONUTF8: "1"

jobs:
  validate-packaging:
    name: Validate plugin packaging and contracts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Validate Codex plugin
        run: python skills/.system/scripts/validate_codex_plugin.py --plugin-root . --strict --format json

      - name: Validate Claude plugin
        run: python skills/.system/scripts/validate_claude_plugin.py --plugin-root . --format json

      - name: Check pack health
        run: python skills/.system/scripts/check_pack_health.py --skills-root skills --strict --format json

      - name: Validate plugin tool-call contracts
        run: python skills/.system/scripts/validate_tool_contracts.py --skills-root skills --strict --format json

      - name: Validate prompt router corpus
        run: python skills/.system/scripts/prompt_router.py --corpus skills/.system/references/prompt-router.corpus.json --format json

      - name: Validate release archive plan
        run: python skills/.system/scripts/build_release_zip.py --project-root . --dry-run --format json

  test:
    name: Test (py${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install test dependencies
        run: python -m pip install --upgrade pip -r requirements-dev.txt

      - name: Run full test suite
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            python -m pytest skills/tests -q -k "not test_project_traversal_does_not_follow_symlinks_outside_root"
          else
            python -m pytest skills/tests -q
          fi

  test-python-min:
    name: Test (py3.11 smoke, ubuntu)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install test dependencies
        run: python -m pip install --upgrade pip -r requirements-dev.txt

      - name: Run smoke test suite
        run: python skills/tests/smoke_test.py

      - name: Run core contract pytest subset
        run: |
          python -m pytest \
            skills/tests/test_release_integrity.py \
            skills/tests/test_pack_health.py \
            skills/tests/test_tool_contracts.py \
            skills/tests/test_workflow_linkage.py \
            skills/tests/test_codex_native_plugin.py \
            skills/tests/test_claude_compatibility.py \
            -q

  trust-harness-smoke:
    name: Trust harness smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install test dependencies
        run: python -m pip install --upgrade pip -r requirements-dev.txt

      - name: Run trust harness (validators only)
        run: |
          python skills/.system/scripts/trust_harness.py \
            --skills-root skills \
            --setup none \
            --skip-tests \
            --format json

  memory-at-scale-medium:
    name: Memory at scale (medium)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Run medium scale gate
        id: scale_gate
        run: |
          set -euo pipefail
          python skills/codex-project-memory/scripts/run_scale_gate.py \
            --tier medium \
            --file-count 2500 \
            --max-files 5000 \
            --budget-seconds 420 \
            --report-path scale-gate-report-medium.json \
            --format json

      - name: Scale gate summary
        if: always()
        run: |
          python skills/codex-project-memory/scripts/write_scale_gate_summary.py \
            --report-path scale-gate-report-medium.json \
            --title "Memory scale gate (medium)"

      - name: Upload scale gate report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scale-gate-report-medium
          path: scale-gate-report-medium.json
          if-no-files-found: ignore
          retention-days: 7

  memory-tooling:
    name: Project-memory tooling gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install test dependencies
        run: python -m pip install --upgrade pip -r requirements-dev.txt

      - name: Run focused project-memory contract tests
        run: python -m pytest skills/tests/test_full_cycle_hardening.py -q -k "memory_status or project_memory_tool or memory_tools_fixture"

      - name: Build project-memory artifacts
        run: |
          python skills/codex-project-memory/scripts/build_knowledge_index.py --project-root .
          python skills/codex-project-memory/scripts/build_knowledge_graph.py --project-root .

      - name: Validate project-memory status (warnings allowed)
        run: python skills/codex-project-memory/scripts/memory_status.py --project-root . --format json

      - name: Validate project-memory strict behavior is explicit
        shell: bash
        run: |
          set +e
          python skills/codex-project-memory/scripts/memory_status.py --project-root . --strict --format json
          code=$?
          set -e
          if [[ "$code" != "0" && "$code" != "1" ]]; then
            echo "Unexpected memory_status --strict exit code: $code"
            exit 1
          fi

  plugin-pack-release-smoke:
    name: Plugin pack release smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Run local release gate (dry-run)
        run: python skills/.system/scripts/local_release_gate.py --format json

  security-advisory:
    name: Security scan (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Run pip-audit on dev requirements
        run: pip-audit -r requirements-dev.txt || true

  github-cli-contract:
    name: GitHub CLI contract
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Ensure GitHub CLI is available
        run: gh --version

      - name: Verify unauthenticated contract is documented
        run: |
          test -f skills/.system/GITHUB_CLI_INTEGRATION.md
          grep -q "gh auth login" skills/.system/GITHUB_CLI_INTEGRATION.md
