# Production releases are handled by deploy.yml on tag push v*.
# This workflow remains for manual packaging without creating a GitHub Release.

name: Release Package (manual)

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.13"
  PYTHONUTF8: "1"

jobs:
  package:
    name: Build releasable plugin archive (no GitHub Release)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Run local release gate
        run: python skills/.system/scripts/local_release_gate.py --apply --format json

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: codexai-skill-pack
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 30
